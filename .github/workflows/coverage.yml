name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run coverage (default features)
        run: |
          cargo tarpaulin \
            --out Xml \
            --output-dir coverage/ \
            --timeout 120 \
            --exclude-files "argot-derive/*" \
            --exclude-files "examples/*"

      - name: Run coverage (all features)
        run: |
          cargo tarpaulin \
            --all-features \
            --out Xml \
            --output-dir coverage-all/ \
            --timeout 120 \
            --exclude-files "argot-derive/*" \
            --exclude-files "examples/*"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage threshold
        run: |
          # Extract line coverage percentage from the XML report.
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage/cobertura.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0)) * 100
          print(f'{rate:.1f}')
          ")
          echo "Line coverage: ${COVERAGE}%"
          python3 -c "
          rate = float('${COVERAGE}')
          if rate < 80:
              raise SystemExit(f'Coverage {rate:.1f}% is below the 80% threshold')
          print(f'Coverage {rate:.1f}% meets the 80% threshold')
          "
